version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR explicitly..."
      - aws --version
      # Hardcoded structural variables to prevent empty variable evaluation drops
      - AWS_ACCOUNT_ID="651015496538"
      - AWS_DEFAULT_REGION="eu-north-1"
      - REPOSITORY_URI="651015496538.dkr.ecr.eu-north-1.amazonaws.com/ai-lead-qualifier"
      - ECR_DOMAIN="651015496538.dkr.ecr.eu-north-1.amazonaws.com"
      
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_DOMAIN
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images to ECR...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image definitions file for ECS Fargate instantiation deployment...
      - printf '[{"name":"api-container","imageUri":"%s"}]' "$REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json
      - echo Deployment configuration file successfully generated.

artifacts:
  files:
    - imagedefinitions.json
